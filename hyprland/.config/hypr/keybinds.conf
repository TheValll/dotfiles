# ============================================
# Keybinds
# SUPER = main modifier
# ============================================

$mainMod = SUPER

# ── Apps ─────────────────────────────────────
bindd = $mainMod, Return, terminal, exec, $term
bindd = $mainMod, D, app launcher, exec, pkill rofi || true && rofi -show drun -modi drun,filebrowser,run,window
bindd = $mainMod, B, browser, exec, $browser
bindd = $mainMod, E, file manager, exec, $files
bindd = $mainMod SHIFT, Return, dropdown terminal, exec, $scriptsDir/dropterminal.sh $term

# ── Window management ────────────────────────
bindd = $mainMod, Q, close window, killactive,
bindd = $mainMod SHIFT, Q, kill process, exec, $scriptsDir/killactiveprocess.sh
bindd = $mainMod SHIFT, F, fullscreen, fullscreen
bindd = $mainMod CTRL, F, maximize, fullscreen, 1
bindd = $mainMod, SPACE, toggle float, togglefloating,
bindd = $mainMod SHIFT, I, toggle split, togglesplit
bindd = $mainMod, P, toggle pseudo, pseudo,
bindd = $mainMod, G, toggle group, togglegroup
bindd = $mainMod, Tab, next in group, changegroupactive, f
bindd = $mainMod SHIFT, Tab, prev in group, changegroupactive, b
bindd = ALT, tab, cycle windows, cyclenext

# ── Focus (arrow keys) ──────────────────────
bindd = $mainMod, left, focus left, movefocus, l
bindd = $mainMod, right, focus right, movefocus, r
bindd = $mainMod, up, focus up, movefocus, u
bindd = $mainMod, down, focus down, movefocus, d

# ── Move windows ─────────────────────────────
bindd = $mainMod CTRL, left, move left, movewindow, l
bindd = $mainMod CTRL, right, move right, movewindow, r
bindd = $mainMod CTRL, up, move up, movewindow, u
bindd = $mainMod CTRL, down, move down, movewindow, d

# ── Swap windows ─────────────────────────────
bindd = $mainMod ALT, left, swap left, swapwindow, l
bindd = $mainMod ALT, right, swap right, swapwindow, r
bindd = $mainMod ALT, up, swap up, swapwindow, u
bindd = $mainMod ALT, down, swap down, swapwindow, d

# ── Resize ───────────────────────────────────
binded = $mainMod SHIFT, left, resize left, resizeactive, -50 0
binded = $mainMod SHIFT, right, resize right, resizeactive, 50 0
binded = $mainMod SHIFT, up, resize up, resizeactive, 0 -50
binded = $mainMod SHIFT, down, resize down, resizeactive, 0 50

# ── Workspaces (1-9 + 0) ────────────────────
bindd = $mainMod, code:10, workspace 1, workspace, 1
bindd = $mainMod, code:11, workspace 2, workspace, 2
bindd = $mainMod, code:12, workspace 3, workspace, 3
bindd = $mainMod, code:13, workspace 4, workspace, 4
bindd = $mainMod, code:14, workspace 5, workspace, 5
bindd = $mainMod, code:15, workspace 6, workspace, 6
bindd = $mainMod, code:16, workspace 7, workspace, 7
bindd = $mainMod, code:17, workspace 8, workspace, 8
bindd = $mainMod, code:18, workspace 9, workspace, 9
bindd = $mainMod, code:19, workspace 10, workspace, 10

# Move to workspace
bindd = $mainMod SHIFT, code:10, move to ws 1, movetoworkspace, 1
bindd = $mainMod SHIFT, code:11, move to ws 2, movetoworkspace, 2
bindd = $mainMod SHIFT, code:12, move to ws 3, movetoworkspace, 3
bindd = $mainMod SHIFT, code:13, move to ws 4, movetoworkspace, 4
bindd = $mainMod SHIFT, code:14, move to ws 5, movetoworkspace, 5
bindd = $mainMod SHIFT, code:15, move to ws 6, movetoworkspace, 6
bindd = $mainMod SHIFT, code:16, move to ws 7, movetoworkspace, 7
bindd = $mainMod SHIFT, code:17, move to ws 8, movetoworkspace, 8
bindd = $mainMod SHIFT, code:18, move to ws 9, movetoworkspace, 9
bindd = $mainMod SHIFT, code:19, move to ws 10, movetoworkspace, 10

# Move silently to workspace
bindd = $mainMod CTRL, code:10, silent move ws 1, movetoworkspacesilent, 1
bindd = $mainMod CTRL, code:11, silent move ws 2, movetoworkspacesilent, 2
bindd = $mainMod CTRL, code:12, silent move ws 3, movetoworkspacesilent, 3
bindd = $mainMod CTRL, code:13, silent move ws 4, movetoworkspacesilent, 4
bindd = $mainMod CTRL, code:14, silent move ws 5, movetoworkspacesilent, 5
bindd = $mainMod CTRL, code:15, silent move ws 6, movetoworkspacesilent, 6
bindd = $mainMod CTRL, code:16, silent move ws 7, movetoworkspacesilent, 7
bindd = $mainMod CTRL, code:17, silent move ws 8, movetoworkspacesilent, 8
bindd = $mainMod CTRL, code:18, silent move ws 9, movetoworkspacesilent, 9
bindd = $mainMod CTRL, code:19, silent move ws 10, movetoworkspacesilent, 10

# Navigate workspaces
bindd = $mainMod, period, next workspace, workspace, e+1
bindd = $mainMod, comma, prev workspace, workspace, e-1
bindd = $mainMod, mouse_down, next workspace, workspace, e+1
bindd = $mainMod, mouse_up, prev workspace, workspace, e-1
bindd = $mainMod SHIFT, bracketleft, move to prev ws, movetoworkspace, -1
bindd = $mainMod SHIFT, bracketright, move to next ws, movetoworkspace, +1

# Special workspace
bindd = $mainMod, U, toggle special, togglespecialworkspace,
bindd = $mainMod SHIFT, U, move to special, movetoworkspace, special

# Move workspace to monitor
bindd = $mainMod CTRL, F9, ws to left monitor, movecurrentworkspacetomonitor, l
bindd = $mainMod CTRL, F10, ws to right monitor, movecurrentworkspacetomonitor, r

# ── Mouse ────────────────────────────────────
bindmd = $mainMod, mouse:272, move window, movewindow
bindmd = $mainMod, mouse:273, resize window, resizewindow

# ── Tools ────────────────────────────────────
bindd = $mainMod ALT, V, clipboard, exec, $scriptsDir/clipmanager.sh
bindd = $mainMod SHIFT, N, notifications, exec, swaync-client -t -sw
bindd = $mainMod CTRL ALT, B, toggle waybar, exec, pkill -SIGUSR1 waybar
bindd = $mainMod SHIFT, M, monitor config, exec, nwg-displays
bindd = $mainMod, W, keyboard pointer, exec, $HOME/.local/bin/wl-kbptr

# ── Screenshots ──────────────────────────────
bindd = $mainMod, Print, screenshot full, exec, $scriptsDir/screenshot.sh --now
bindd = $mainMod SHIFT, S, screenshot area, exec, $scriptsDir/screenshot.sh --swappy
bindd = $mainMod SHIFT, Print, screenshot area, exec, $scriptsDir/screenshot.sh --area
bindd = ALT, Print, screenshot window, exec, $scriptsDir/screenshot.sh --active

# ── Media keys ───────────────────────────────
bindeld = , xf86audioraisevolume, vol up, exec, $scriptsDir/volume.sh --inc
bindeld = , xf86audiolowervolume, vol down, exec, $scriptsDir/volume.sh --dec
bindld = , xf86audiomute, mute, exec, $scriptsDir/volume.sh --toggle
bindld = , xf86AudioMicMute, mic mute, exec, $scriptsDir/volume.sh --toggle-mic
bindld = , xf86AudioPlayPause, play/pause, exec, playerctl play-pause
bindld = , xf86AudioNext, next, exec, playerctl next
bindld = , xf86AudioPrev, prev, exec, playerctl previous
bindld = , xf86Sleep, sleep, exec, systemctl suspend

# ── Brightness (laptop) ─────────────────────
binde = , xf86MonBrightnessDown, exec, $scriptsDir/brightness.sh --dec
binde = , xf86MonBrightnessUp, exec, $scriptsDir/brightness.sh --inc
binde = , xf86KbdBrightnessDown, exec, brightnessctl -d '*::kbd_backlight' set 30%-
binde = , xf86KbdBrightnessUp, exec, brightnessctl -d '*::kbd_backlight' set +30%

# ── Session ──────────────────────────────────
bindd = CTRL ALT, L, lock, exec, loginctl lock-session
bindd = CTRL ALT, P, power menu, exec, $scriptsDir/wlogout.sh
bindd = CTRL ALT, Delete, exit hyprland, exec, hyprctl dispatch exit 0
