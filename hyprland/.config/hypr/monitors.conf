# ============================================
# Monitors & Workspaces
# Use nwg-displays to configure, or edit manually
# The fallback line catches any unmatched monitor
# ============================================

# Fallback: any monitor not listed below gets auto-configured
monitor = , preferred, auto, 1

# ── Per-machine overrides ────────────────────
# Uncomment/edit for your setup, or use nwg-displays
# monitor = eDP-1, 1920x1200@59.95, 0x240, 1.0
# monitor = DP-5, 1920x1080@74.97, 1920x360, 1.0
# monitor = DP-6, 1920x1080@74.97, 3840x360, 1.0

# ── Workspaces ───────────────────────────────
# Default: spread across available monitors
workspace = 1, default:true
workspace = 2
workspace = 3
workspace = 4
workspace = 5
workspace = 6
workspace = 7
workspace = 8
workspace = 9
