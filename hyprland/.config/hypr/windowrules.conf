# ============================================
# Window Rules
# ============================================

# ── Tags ─────────────────────────────────────
windowrule = match:class ^([Ff]irefox|org.mozilla.firefox|[Gg]oogle-chrome.*|[Cc]hromium|[Mm]icrosoft-edge.*|Brave-browser.*|zen.*)$, tag +browser
windowrule = match:class ^(Alacritty|kitty|kitty-dropterm)$, tag +terminal
windowrule = match:class ^(codium.*|VSCodium|VSCode|code|code-url-handler|jetbrains-.+)$, tag +projects
windowrule = match:class ^([Dd]iscord|[Ww]ebCord|[Vv]esktop|[Ff]erdium|[Ww]hatsapp-for-linux|org.telegram.desktop|teams-for-linux)$, tag +im
windowrule = match:class ^([Tt]hunar|org.gnome.Nautilus)$, tag +file-manager
windowrule = match:class ^(nm-applet|nm-connection-editor|blueman-manager|pavucontrol|org.pulseaudio.pavucontrol|qt5ct|qt6ct|[Yy]ad)$, tag +settings
windowrule = match:class ^([Mm]pv|vlc)$, tag +video
windowrule = match:class ^(gamescope|steam_app_\\d+)$, tag +games
windowrule = match:class ^(swaync-control-center|swaync-notification-window)$, tag +notif

# ── Float ────────────────────────────────────
windowrule = match:tag settings, float on
windowrule = match:tag video, float on
windowrule = match:class ^(org.gnome.Calculator)$, float on
windowrule = match:class ^([Ff]erdium)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Authentication Required)$, float on, center on
windowrule = match:title ^(Save As)$, float on, size (monitor_w*0.7) (monitor_h*0.6), center on
windowrule = match:title ^(Open Files)$, float on, size (monitor_w*0.7) (monitor_h*0.6)

# Pop-ups from tiled apps
windowrule = match:class (codium|VSCodium) match:title negative:(.*codium.*|.*VSCodium.*), float on
windowrule = match:class ^([Ss]team)$ match:title negative:^([Ss]team)$, float on
windowrule = match:class ([Tt]hunar) match:title negative:(.*[Tt]hunar.*), float on

# ── Center ───────────────────────────────────
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol)$, center on
windowrule = match:class ^([Ff]erdium)$, center on, size (monitor_w*0.6) (monitor_h*0.7)

# ── Opacity ──────────────────────────────────
windowrule = match:tag browser, opacity 0.99 0.8
windowrule = match:tag projects, opacity 0.9 0.8
windowrule = match:tag im, opacity 0.94 0.86
windowrule = match:tag file-manager, opacity 0.9 0.8
windowrule = match:tag terminal, opacity 1.0 1.0
windowrule = match:tag settings, opacity 0.8 0.7
windowrule = match:tag video, no_blur on, opacity 1.0

# ── Picture in Picture ───────────────────────
windowrule = match:title ^(Picture-in-Picture)$, pin on, keep_aspect_ratio on, move 72% 7%, opacity 0.95 0.75

# ── Games ────────────────────────────────────
windowrule = match:tag games, no_blur on, fullscreen 0

# ── Idle inhibit ─────────────────────────────
windowrule = match:fullscreen true, idle_inhibit fullscreen

# ── Layer rules ──────────────────────────────
layerrule = match:namespace rofi, blur on
layerrule = match:namespace notifications, blur on
