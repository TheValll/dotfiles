# ============================================
# Base
# ============================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g mouse on
set -g base-index 2
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g history-limit 10000
set -g cursor-style beam

# ============================================
# Prefix: Ctrl+a
# ============================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ============================================
# Keybinds
# ============================================
# Reload config
bind r source-file ~/.tmux.conf \; display "Config rechargee!"

# Splits (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Sesh (tmux session picker)
unbind t
bind-key "t" display-popup -E -w 55% -h 60% "tmux-sesh"

# Copy mode (vim style)
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ============================================
# Theme: Tokyonight
# ============================================
set -g status-style bg=#1f2335,fg=#c0caf5
set -g pane-border-style fg=#3b4261
set -g pane-active-border-style fg=#7aa2f7
set -g window-status-style fg=#565f89
set -g window-status-current-style fg=#7aa2f7,bold
set -g message-style bg=#1f2335,fg=#7aa2f7
set -g message-command-style bg=#1f2335,fg=#7aa2f7

# ============================================
# Status bar
# ============================================
set -g status-position top
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Left: session name
set -g status-left "#[fg=#1f2335,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1f2335] "

# Right: time + date + hostname
set -g status-right "#[fg=#565f89]#[fg=#565f89,bg=#1f2335] %H:%M #[fg=#3b4261]#[fg=#565f89,bg=#3b4261] %d/%m #[fg=#7aa2f7,bg=#3b4261]#[fg=#1f2335,bg=#7aa2f7,bold] #H "

# Window tabs
setw -g window-status-format "#[fg=#565f89,bg=#1f2335] #I:#W "
setw -g window-status-current-format "#[fg=#1f2335,bg=#7aa2f7,bold] #I:#W #[fg=#7aa2f7,bg=#1f2335]"
setw -g window-status-separator ""

# ============================================
# Plugins (TPM)
# ============================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Init TPM (keep last)
run '~/.tmux/plugins/tpm/tpm'
